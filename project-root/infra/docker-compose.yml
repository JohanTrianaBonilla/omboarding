version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant_service
    environment:
      QDRANT__STORAGE__PATH: "/qdrant/storage"
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  flask:
    build: ../services/api-flask
    container_name: flask_ai
    depends_on:
      - qdrant
    environment:
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT}
      EMBED_MODEL: ${EMBED_MODEL}
    ports:
      - "5001:5001"

  api:
    build: ../services/api-fastapi
    container_name: fastapi_service
    depends_on:
      - db
      - flask
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FLASK_SEARCH_URL: ${FLASK_SEARCH_URL}
      FLASK_EMBED_URL: ${FLASK_EMBED_URL}
      FASTAPI_URL: ${FASTAPI_URL}
    volumes:
      - ../pipelines/etl/pdfs:/pdfs
    ports:
      - "8000:8000"

  react:
    build: ../services/frontend-react
    container_name: react_app
    depends_on:
      - api
      - svelte-mf
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_SVELTE_MF_URL: http://localhost:5174
    ports:
      - "5173:5173"

  svelte-mf:
    build: ../ui/svelte-mf
    container_name: svelte_mf
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5174:5174"

  worker_rust:
    build: ../services/worker-rust/mass_pdf_worker
    container_name: rust_worker
    depends_on:
      - api
      - flask
    volumes:
      - ../pipelines/etl/pdfs:/pdfs
    environment:
      FASTAPI_URL: ${FASTAPI_URL}
    command: ["mass_pdf_worker"]

volumes:
  postgres_data:
  qdrant_data:
